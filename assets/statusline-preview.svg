    <line x1="1" y1="104" x2="719" y2="104" stroke="#3b3d52" stroke-width="0.5"/>
    <text y="121">
      <tspan class="dim" x="14"> &gt; </tspan>
      <tspan class="cursor">&#9614;</tspan>
    </text>
  </g>

